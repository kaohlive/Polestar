<header class="homey-header">
	<h1 class="homey-title">
		Polestar Account
	</h1>
	<p class="homey-subtitle">
		Please provide your account details.<br />
		These will be stored on your Homey encrypted and used to login during app operations.
	</p>
</header>
<img src="../assets/images/polestar.png" style="width: 100%; max-width: 420px; height: auto; margin-bottom: 20px;" />
<form class="homey-form" id="loginForm">
	<fieldset class="homey-form-fieldset">
		<legend class="homey-form-legend">Account settings</legend>

		<div class="homey-form-group">
			<label class="homey-form-label" for="username">Username</label>
			<input class="homey-form-input" id="username" name="username" type="text" value="" />
		</div>
		<div class="homey-form-group">
			<label class="homey-form-label" for="password">Password</label>
			<input class="homey-form-input" id="password" name="password" type="password" value="" />
		</div>
		<button class="homey-button-primary-full" id="save">Login</button>
	</fieldset>
</form>

<script type="text/javascript">
	(function () {
		var form = document.getElementById('loginForm');
		var usernameElement = document.getElementById('username');
		var passwordElement = document.getElementById('password');

		function pairlog(message) {
			try { Homey.emit('pairlog', String(message)).catch(function () {}); } catch (_) {}
		}

		Homey.on('loadaccount', function (credentials) {
			usernameElement.value = credentials && credentials.username || '';
			passwordElement.value = credentials && credentials.password || '';
		});

		Homey.on('noVehiclesFound', function (message) {
			Homey.alert(message);
			return Homey.done();
		});

		form.addEventListener('submit', function (event) {
			event.preventDefault();
			Homey.showLoadingOverlay();
			pairlog('login submitted');

			Homey.emit('testlogin', {
				username: usernameElement.value,
				password: passwordElement.value
			}).then(function (result) {
				var ok = result === true || (result && result.ok === true);
				if (!ok) {
					Homey.hideLoadingOverlay();
					var message = result && result.reason === 'no_vehicles'
						? 'Login succeeded, but no linked vehicles were returned for this account.'
						: 'Login validation failed. Check your email address and password.';
					return Homey.alert(message);
				}

				return Homey.emit('discover_vehicles').then(function (discovered) {
					Homey.hideLoadingOverlay();
					if (discovered) Homey.nextView();
				});
			}).catch(function (error) {
				Homey.hideLoadingOverlay();
				pairlog('login failed: ' + (error && error.message || error));
				Homey.alert('Something went wrong while contacting Polestar.');
			});
		});
	})();
</script>

</body>
